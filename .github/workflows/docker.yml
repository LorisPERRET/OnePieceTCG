name: CI + Manual Image Pipeline

on:
    push:
        branches: ["main", "develop", "ci*"]
    pull_request:
    workflow_dispatch:
        inputs:
            run_image_build:
                description: "Build/push Docker image"
                required: true
                default: false
                type: boolean
            run_image_deploy:
                description: "Deploy Docker image (after build)"
                required: true
                default: false
                type: boolean
            deploy_environment:
                description: "Target environment"
                required: true
                default: "staging"
                type: choice
                options:
                    - staging
                    - production

permissions:
    contents: read
    packages: write

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    compile:
        name: Build
        runs-on: ubuntu-latest
        env:
            DATABASE_URL: postgresql://postgres:postgres@localhost:5432/onepiecetcg
            NEXTAUTH_SECRET: ci-nextauth-secret
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Generate Prisma client
              run: npx prisma generate

            - name: Verify build
              run: npm run build

    test:
        name: Test
        runs-on: ubuntu-latest
        needs: compile
        env:
            DATABASE_URL: postgresql://postgres:postgres@localhost:5432/onepiecetcg
            NEXTAUTH_SECRET: ci-nextauth-secret
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Generate Prisma client
              run: npx prisma generate

            - name: Run tests (if configured)
              run: npm run test --if-present

    lint:
        name: Lint
        runs-on: ubuntu-latest
        needs: compile
        env:
            DATABASE_URL: postgresql://postgres:postgres@localhost:5432/onepiecetcg
            NEXTAUTH_SECRET: ci-nextauth-secret
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Generate Prisma client
              run: npx prisma generate

            - name: Lint code
              run: npm run lint

    manual_image_build:
        name: Build image
        runs-on: ubuntu-latest
        needs: test
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_image_build }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v3

            - name: Set up Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Extract Docker metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=raw,value=latest
                      type=sha,format=short,prefix=sha-

            - name: Build and push image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: ./Dockerfile
                  platforms: linux/amd64
                  push: true
                  build-args: |
                      NEXTAUTH_SECRET=ci-nextauth-secret
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

    manual_image_deploy:
        name: Deploy image
        runs-on: [self-hosted, linux]
        needs: manual_image_build
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_image_build && inputs.run_image_deploy }}
        environment:
            name: ${{ inputs.deploy_environment }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Log in to GHCR
              env:
                  GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
                  GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
              run: |
                  export DOCKER_CONFIG="$RUNNER_TEMP/.docker"
                  mkdir -p "$DOCKER_CONFIG"
                  cd /onepiecetcg

                  if [ -z "$GHCR_USERNAME" ] || [ -z "$GHCR_TOKEN" ]; then
                    echo "Missing GHCR_USERNAME or GHCR_TOKEN secret"
                    exit 1
                  fi

                  echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

            - name: Pull and restart stack
              run: |
                  export DOCKER_CONFIG="$RUNNER_TEMP/.docker"
                  cd /onepiecetcg
                  docker context use desktop-linux
                  echo "Docker context: $(docker context show)"
                  docker info --format 'Docker daemon name: {{.Name}}'
                  docker network inspect proxy >/dev/null 2>&1 || docker network create proxy
                  docker compose -f /onepiecetcg/docker-compose.yml pull
                  docker compose -f /onepiecetcg/docker-compose.yml up -d --remove-orphans
                  docker compose -f /onepiecetcg/docker-compose.yml ps
